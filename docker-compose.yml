# Inventory Management System — one-command deployment.
#
# Builds the backend and frontend directly from their GitHub repositories
# (remote build contexts), so this repo is fully self-contained: clone it,
# run `docker compose up`, and the whole stack comes up.
#
# To pin a version, change `#main` to a tag/commit on each context.

services:
  db:
    image: postgres:16-alpine
    container_name: ims-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ims']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: https://github.com/devilthecoder1123/inventory-management-backend.git#main
    image: ims-backend:latest
    container_name: ims-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ims?schema=public
      JWT_SECRET: super-secret-change-me-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
      RUN_SEED: 'true' # seed demo data on first boot
    ports:
      - '4000:4000'

  frontend:
    build:
      context: https://github.com/devilthecoder1123/inventory-management-frontend.git#main
      args:
        VITE_API_URL: /api # same-origin; nginx proxies /api -> backend
    image: ims-frontend:latest
    container_name: ims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  db_data:
